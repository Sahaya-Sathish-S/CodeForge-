<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Quiz Battle - CodeForge PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
}

.game{
position:fixed;
inset:0;
background:url("background.png") center center/cover no-repeat;
overflow:hidden;
}

.game::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to right,
rgba(0,0,0,.8),
rgba(0,255,255,.08),
rgba(0,0,0,.8));
}

.game::after{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle,rgba(0,255,255,.35) 1px,transparent 1px),
radial-gradient(circle,rgba(255,170,0,.25) 1px,transparent 1px);
background-size:40px 40px,70px 70px;
animation:stars 8s linear infinite;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(80px)}
}

.layer{
position:absolute;
inset:0;
display:none;
z-index:5;
}

.show{display:block}

.search-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.glass{
font-size:120px;
filter:drop-shadow(0 0 25px #00ffff);
animation:hunt 2s infinite ease-in-out;
}

@keyframes hunt{
0%{transform:translate(-80px,-20px)}
50%{transform:translate(80px,40px)}
100%{transform:translate(-80px,-20px)}
}

.search-text{
margin-top:15px;
font-size:30px;
font-weight:bold;
text-shadow:0 0 15px #00ffff;
}

.topbar{
position:absolute;
top:10px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 14px;
z-index:10;
}

.player,.timer{
padding:10px 16px;
border-radius:14px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(8px);
font-weight:bold;
font-size:20px;
box-shadow:0 0 14px rgba(255,255,255,.18);
}

.player{
min-width:120px;
text-align:center;
}

.youBox{box-shadow:0 0 18px #00ffff}
.botBox{box-shadow:0 0 18px #ff8800}

.timer{
min-width:90px;
text-align:center;
font-size:26px;
}

.quiz-wrap{
position:absolute;
top:78px;
bottom:0;
left:0;
right:0;
padding:14px;
display:flex;
flex-direction:column;
justify-content:space-evenly;
}

.question{
padding:18px;
border-radius:18px;
background:rgba(0,0,0,.58);
font-size:28px;
font-weight:bold;
text-align:center;
box-shadow:0 0 24px rgba(0,255,255,.55);
}

.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.opt{
padding:16px;
border:none;
border-radius:16px;
font-size:20px;
font-weight:bold;
cursor:pointer;
color:#fff;
background:rgba(255,255,255,.08);
box-shadow:0 0 12px rgba(255,255,255,.15);
transition:.2s;
}

.opt:hover{transform:scale(1.03)}

.opt.correct{
background:linear-gradient(90deg,#00ff88,#00cc66);
}

.opt.wrong{
background:linear-gradient(90deg,#ff3333,#ff7700);
}

.think{
text-align:center;
font-size:22px;
font-weight:bold;
color:#ffd400;
animation:blink .8s infinite;
}

@keyframes blink{
50%{opacity:.25}
}

.result-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:92%;
max-width:900px;
padding:24px;
border-radius:22px;
background:rgba(0,0,0,.8);
text-align:center;
box-shadow:0 0 25px #00ffff;
}

.result-box h1{
font-size:44px;
margin-bottom:12px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px;
}

.card{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.08);
font-size:20px;
}

.tip{
margin-top:18px;
font-size:22px;
color:#ffe600;
}

button{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:16px;
font-size:22px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#ffe600,#ff9900);
box-shadow:0 0 18px #ffb400;
}

.rotate{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:#000;
font-size:28px;
z-index:999;
}

@media (orientation:portrait){
.rotate{display:flex}
.game{display:none}
}
</style>
</head>

<body>

<div class="rotate">🔄 Rotate Device to Landscape</div>

<div class="game">

<div id="searchScreen" class="layer show">
<div class="search-box">
<div class="glass">🔍</div>
<div class="search-text">SEARCHING OPPONENT...</div>
</div>
</div>

<div id="quizScreen" class="layer">
<div class="topbar">
<div class="player youBox">YOU : <span id="youScore">0</span></div>
<div class="timer" id="timer">20</div>
<div class="player botBox">OPP : <span id="botScore">0</span></div>
</div>

<div class="quiz-wrap">
<div class="question" id="question">Loading...</div>
<div class="options" id="options"></div>
<div class="think" id="think">⚔ Live Battle</div>
</div>
</div>

<div id="resultScreen" class="layer">
<div class="result-box">
<h1 id="resultTitle">RESULT</h1>

<div class="stats">
<div class="card">✅ Correct : <span id="correctCount">0</span></div>
<div class="card">❌ Wrong : <span id="wrongCount">0</span></div>
<div class="card">🏆 Your Score : <span id="myTime">0</span></div>
<div class="card">⚔ Opp Score : <span id="botTime">0</span></div>
</div>

<div class="tip" id="tipText"></div>

<button onclick="location.reload()">PLAY AGAIN</button>
</div>
</div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io();

let room = "";
let player = "";
let quiz = [];

let index=0;
let you=0;
let bot=0;
let correct=0;
let wrong=0;
let timeLeft=20;
let timerInterval=null;
let answered=false;

/* SEARCH MATCH */
socket.emit("find_match");

/* MATCH FOUND */
socket.on("match_found",(data)=>{

room = data.room;
player = data.player;
quiz = data.questions;

setTimeout(()=>{
searchScreen.classList.remove("show");
quizScreen.classList.add("show");
loadQuestion();
},2000);

});

/* SCORE UPDATE */
socket.on("score_update",(data)=>{

if(player==="p1"){
you = data.p1;
bot = data.p2;
}else{
you = data.p2;
bot = data.p1;
}

youScore.innerText = you;
botScore.innerText = bot;

});

/* FINAL RESULT */
socket.on("game_result",(data)=>{

quizScreen.classList.remove("show");
resultScreen.classList.add("show");

let my = player==="p1" ? data.p1 : data.p2;
let opp = player==="p1" ? data.p2 : data.p1;

myTime.innerText = my;
botTime.innerText = opp;
correctCount.innerText = correct;
wrongCount.innerText = wrong;

let title="🤝 DRAW";
let tip="Perfect battle!";

if(my > opp){
title="🏆 YOU WIN!";
tip="Excellent performance!";
}
else if(my < opp){
title="💀 YOU LOSE!";
tip="Practice more and retry.";
}

resultTitle.innerText = title;
tipText.innerText = tip;

});

/* QUESTION LOAD */
function loadQuestion(){

if(index >= quiz.length){
socket.emit("finish_game",{room});
return;
}

answered=false;
timeLeft=20;

question.innerText = quiz[index].q;
options.innerHTML="";

quiz[index].o.forEach((txt,i)=>{

let btn=document.createElement("button");
btn.className="opt";
btn.innerText=txt;
btn.onclick=()=>pickAnswer(i,btn);

options.appendChild(btn);

});

timer.innerText=timeLeft;

clearInterval(timerInterval);

timerInterval=setInterval(()=>{

timeLeft--;
timer.innerText=timeLeft;

if(timeLeft<=0){
clearInterval(timerInterval);

if(!answered){
wrong++;
socket.emit("submit_answer",{
room:room,
player:player,
correct:false
});
nextQuestion();
}

}

},1000);

}

/* PICK */
function pickAnswer(i,btn){

if(answered) return;
answered=true;

clearInterval(timerInterval);

document.querySelectorAll(".opt").forEach(x=>x.disabled=true);

let isCorrect = i === quiz[index].a;

if(isCorrect){
btn.classList.add("correct");
correct++;
}else{
btn.classList.add("wrong");
wrong++;
}

socket.emit("submit_answer",{
room:room,
player:player,
correct:isCorrect
});

nextQuestion();

}

/* NEXT */
function nextQuestion(){
setTimeout(()=>{
index++;
loadQuestion();
},1200);
}
</script>

</body>
</html>
