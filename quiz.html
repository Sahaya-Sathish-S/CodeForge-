<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Quiz Battle - CodeForge PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
}

.game{
position:fixed;
inset:0;
background:url("background.png") center center/cover no-repeat;
overflow:hidden;
}

.game::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to right,
rgba(0,0,0,.8),
rgba(0,255,255,.08),
rgba(0,0,0,.8));
}

.game::after{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle,rgba(0,255,255,.35) 1px,transparent 1px),
radial-gradient(circle,rgba(255,170,0,.25) 1px,transparent 1px);
background-size:40px 40px,70px 70px;
animation:stars 8s linear infinite;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(80px)}
}

.layer{
position:absolute;
inset:0;
display:none;
z-index:5;
}

.show{display:block}

/* SEARCH */
.search-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.glass{
font-size:120px;
filter:drop-shadow(0 0 25px #00ffff);
animation:hunt 2s infinite ease-in-out;
}

@keyframes hunt{
0%{transform:translate(-80px,-20px)}
50%{transform:translate(80px,40px)}
100%{transform:translate(-80px,-20px)}
}

.search-text{
margin-top:15px;
font-size:30px;
font-weight:bold;
text-shadow:0 0 15px #00ffff;
}

/* TOP */
.topbar{
position:absolute;
top:10px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 14px;
z-index:10;
}

.player,.timer{
padding:10px 16px;
border-radius:14px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(8px);
font-weight:bold;
font-size:20px;
box-shadow:0 0 14px rgba(255,255,255,.18);
}

.player{
min-width:120px;
text-align:center;
}

.youBox{box-shadow:0 0 18px #00ffff}
.botBox{box-shadow:0 0 18px #ff8800}

.timer{
min-width:90px;
text-align:center;
font-size:26px;
}

/* QUIZ */
.quiz-wrap{
position:absolute;
top:78px;
bottom:0;
left:0;
right:0;
padding:14px;
display:flex;
flex-direction:column;
justify-content:space-evenly;
}

.question{
padding:18px;
border-radius:18px;
background:rgba(0,0,0,.58);
font-size:28px;
font-weight:bold;
text-align:center;
box-shadow:0 0 24px rgba(0,255,255,.55);
}

.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.opt{
padding:16px;
border:none;
border-radius:16px;
font-size:20px;
font-weight:bold;
cursor:pointer;
color:#fff;
background:rgba(255,255,255,.08);
box-shadow:0 0 12px rgba(255,255,255,.15);
transition:.2s;
}

.opt:active,
.opt:hover{
transform:scale(1.03);
}

.opt.selected{
background:linear-gradient(90deg,#00ffff,#0066ff);
}

.opt.correct{
background:linear-gradient(90deg,#00ff88,#00cc66);
}

.opt.wrong{
background:linear-gradient(90deg,#ff3333,#ff7700);
}

.think{
text-align:center;
font-size:22px;
font-weight:bold;
color:#ffd400;
animation:blink .8s infinite;
}

@keyframes blink{
50%{opacity:.25}
}

/* RESULT */
.result-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:92%;
max-width:900px;
padding:24px;
border-radius:22px;
background:rgba(0,0,0,.8);
text-align:center;
box-shadow:0 0 25px #00ffff;
}

.result-box h1{
font-size:44px;
margin-bottom:12px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px;
}

.card{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.08);
font-size:20px;
}

.tip{
margin-top:18px;
font-size:22px;
color:#ffe600;
}

button{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:16px;
font-size:22px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#ffe600,#ff9900);
box-shadow:0 0 18px #ffb400;
}

/* ROTATE */
.rotate{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:#000;
font-size:28px;
z-index:999;
}

@media (orientation:portrait){
.rotate{display:flex}
.game{display:none}
}
</style>
</head>

<body>

<div class="rotate">🔄 Rotate Device to Landscape</div>

<div class="game">

<!-- SEARCH -->
<div id="searchScreen" class="layer show">
<div class="search-box">
<div class="glass">🔍</div>
<div class="search-text">SEARCHING OPPONENT...</div>
</div>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="layer">
<div class="topbar">
<div class="player youBox">YOU : <span id="youScore">0</span></div>
<div class="timer" id="timer">20</div>
<div class="player botBox">BOT : <span id="botScore">0</span></div>
</div>

<div class="quiz-wrap">
<div class="question" id="question">Loading...</div>
<div class="options" id="options"></div>
<div class="think" id="think">🤖 Opponent Thinking...</div>
</div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="layer">
<div class="result-box">
<h1 id="resultTitle">RESULT</h1>

<div class="stats">
<div class="card">✅ Correct : <span id="correctCount">0</span></div>
<div class="card">❌ Wrong : <span id="wrongCount">0</span></div>
<div class="card">⏱ Your Time : <span id="myTime">0</span>s</div>
<div class="card">⚔ Opp Time : <span id="botTime">0</span>s</div>
</div>

<div class="tip" id="tipText"></div>

<button onclick="location.reload()">PLAY AGAIN</button>
</div>
</div>

</div>

<script>
/* =========================
   AI QUESTIONS
========================= */

let quiz = [];

/* LOAD QUESTIONS FIRST */
async function loadAIQuiz(){

try{

const res = await fetch("/quiz");
quiz = await res.json();

/* validate */
if(!Array.isArray(quiz) || quiz.length === 0){
throw new Error("No questions");
}

/* start game only AFTER questions loaded */
startGame();

}catch(err){

console.log(err);

/* fallback offline questions */
quiz = [
{q:"HTML stands for ?",o:["Hyper Text Markup Language","Mail","None","High"],a:0},
{q:"CSS used for ?",o:["Styling","Database","Audio","Virus"],a:0},
{q:"JavaScript is ?",o:["Programming Language","Browser","Game","Server"],a:0},
{q:"2 + 2 = ?",o:["4","5","6","3"],a:0},
{q:"Python is ?",o:["Language","Snake only","Car","Tool"],a:0}
];

startGame();

}

}

/* START GAME */
function startGame(){

setTimeout(()=>{

document.getElementById("searchScreen").classList.remove("show");
document.getElementById("quizScreen").classList.add("show");

loadQuestion();

},3000);

}

/* CALL */
loadAIQuiz();


/* =========================
STATE
========================= */
let index=0;
let you=0;
let bot=0;
let correct=0;
let wrong=0;
let myTotal=0;
let botTotal=0;
let timeLeft=20;
let timerInterval=null;
let selected=false;


/* AUDIO */
const bgMusic = new Audio("bg-music.mp3");
const victoryMusic = new Audio("victory.mp3");
const loseMusic = new Audio("lose.mp3");

bgMusic.loop=true;
bgMusic.volume=1;
victoryMusic.volume=1;
loseMusic.volume=1;

const ctx = new (window.AudioContext || window.webkitAudioContext)();

function tone(freq,dur,type="sine",vol=.2){
let osc=ctx.createOscillator();
let gain=ctx.createGain();
osc.type=type;
osc.frequency.value=freq;
gain.gain.value=vol;
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+dur);
}

function playRight(){
tone(900,.10,"triangle",.25);
setTimeout(()=>tone(1200,.14,"triangle",.25),90);
}

function playWrong(){
tone(220,.20,"sawtooth",.25);
setTimeout(()=>tone(160,.22,"sawtooth",.22),100);
}

function heartbeat(){
tone(120,.08,"square",.25);
setTimeout(()=>tone(90,.08,"square",.22),180);
}

function vibrate(ms){
if(navigator.vibrate) navigator.vibrate(ms);
}

document.body.addEventListener("click",startAudio,{once:true});
document.body.addEventListener("touchstart",startAudio,{once:true});

function startAudio(){
ctx.resume();
bgMusic.play().catch(()=>{});
}


/* =========================
LOAD QUESTION
========================= */
function loadQuestion(){

if(index >= quiz.length){
finishGame();
return;
}

selected=false;
timeLeft=20;

question.innerText = quiz[index].q;
options.innerHTML="";
think.style.display="block";

quiz[index].o.forEach((txt,i)=>{

let btn=document.createElement("button");
btn.className="opt";
btn.innerText=txt;
btn.onclick=()=>pickAnswer(i,btn);

options.appendChild(btn);

});

clearInterval(timerInterval);

timer.innerText=timeLeft;
timer.style.color="#fff";

timerInterval=setInterval(()=>{

timeLeft--;
timer.innerText=timeLeft;

if(timeLeft<=10 && timeLeft>0){
timer.style.color="#ff4444";
heartbeat();
}

if(timeLeft<=0){

clearInterval(timerInterval);

if(!selected){
wrong++;
playWrong();
vibrate(200);
}

botAnswer();

}

},1000);

}


/* PICK */
function pickAnswer(i,btn){

if(selected) return;
selected=true;

clearInterval(timerInterval);

document.querySelectorAll(".opt").forEach(x=>x.disabled=true);

if(i===quiz[index].a){

btn.classList.add("correct");
you++;
correct++;
playRight();

}else{

btn.classList.add("wrong");
wrong++;
playWrong();
vibrate([120,60,120]);

}

youScore.innerText=you;

myTotal += (20-timeLeft);

botAnswer();

}


/* BOT */
function botAnswer(){

setTimeout(()=>{

if(Math.random()>0.35) bot++;

botScore.innerText=bot;
botTotal += Math.floor(Math.random()*18)+2;

think.style.display="none";

setTimeout(()=>{
index++;
loadQuestion();
},900);

},900+Math.random()*1200);

}


/* RESULT */
function finishGame(){

quizScreen.classList.remove("show");
resultScreen.classList.add("show");

bgMusic.pause();
bgMusic.currentTime=0;

let title="🤝 DRAW";
let tip="Perfect battle!";

if(you>bot){
title="🏆 YOU WIN!";
tip="Excellent performance!";
victoryMusic.play();
}
else if(bot>you){
title="💀 YOU LOSE!";
tip="Practice more and retry.";
loseMusic.play();
}
else{
victoryMusic.play();
}

resultTitle.innerText=title;
correctCount.innerText=correct;
wrongCount.innerText=wrong;
myTime.innerText=myTotal;
botTime.innerText=botTotal;
tipText.innerText=tip;

}
</script>

</body>
</html>
