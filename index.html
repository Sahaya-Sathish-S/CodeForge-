<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Loading</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:flex-end;
align-items:center;
flex-direction:column;
font-family:Arial, sans-serif;
background:url("background.png") center center/cover no-repeat;
position:relative;
}

body::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.25));
}

.loader-box{
position:relative;
z-index:2;
width:90%;
max-width:700px;
margin-bottom:45px;
text-align:center;
}

.title{
font-size:28px;
font-weight:bold;
color:#fff;
margin-bottom:20px;
text-shadow:0 0 20px #00ccff;
letter-spacing:3px;
}

.bar{
height:18px;
background:rgba(255,255,255,.08);
border-radius:50px;
overflow:hidden;
border:1px solid rgba(255,255,255,.15);
}

.fill{
height:100%;
width:0%;
border-radius:50px;
background:linear-gradient(90deg,#00ccff,#0077ff,#ff6600,#ffaa00);
background-size:300%;
animation:load 4s linear forwards, move 1s linear infinite;
box-shadow:0 0 20px #00ccff;
}

@keyframes load{
from{width:0%;}
to{width:100%;}
}

@keyframes move{
from{background-position:0;}
to{background-position:300%;}
}

.percent{
margin-top:14px;
font-size:20px;
color:white;
text-shadow:0 0 10px #00ccff;
}
</style>
</head>
<body>

<div class="loader-box">
<div class="title">LOADING CODEFORGE</div>

<div class="bar">
<div class="fill"></div>
</div>

<div class="percent" id="percent">0%</div>
</div>

<script>
let num=0;
let txt=document.getElementById("percent");

let run=setInterval(()=>{
num++;
txt.innerHTML=num+"%";

if(num>=100){
clearInterval(run);
txt.innerHTML="READY 🚀";

setTimeout(()=>{
window.location.href="start.html";
},700);
}
},40);
</script>

</body>
</html>
